name: Build Windows

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        architecture: [x64, arm64]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Get dependencies
        working-directory: core/build
        run: python get_dependencies.py -a ${{ matrix.architecture }}

      - name: Generate
        working-directory: core/build
        run: python build.py -p windows -t vs2022 -a ${{ matrix.architecture }} -c release -o generate

      - name: Build
        working-directory: core/build
        run: python build.py -p windows -t vs2022 -a ${{ matrix.architecture }} -c release -o build --parallel 4

      - name: Check DLL size
        shell: pwsh
        run: |
          $dllPath = "core/build/windows-vs2022-${{ matrix.architecture }}/src/core/Release/phonon.dll"
          if (Test-Path $dllPath) {
            $size = (Get-Item $dllPath).Length
            Write-Host "phonon.dll (${{ matrix.architecture }}) size: $([math]::Round($size / 1MB, 2)) MB"
            if ($size -gt 10MB) {
              Write-Error "DLL exceeds 10MB target! Size: $([math]::Round($size / 1MB, 2)) MB"
            }
          } else {
            Write-Error "phonon.dll not found at $dllPath"
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: phonon-windows-${{ matrix.architecture }}
          path: |
            core/build/windows-vs2022-${{ matrix.architecture }}/src/core/Release/phonon.dll
            core/build/windows-vs2022-${{ matrix.architecture }}/src/core/Release/phonon.lib
            core/build/windows-vs2022-${{ matrix.architecture }}/src/core/Release/phonon.pdb

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: phonon-windows-x64
          path: windows-x64

      - name: Download arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: phonon-windows-arm64
          path: windows-arm64

      - name: Package artifacts
        run: |
          cd windows-x64 && zip -r ../phonon-windows-x64.zip . && cd ..
          cd windows-arm64 && zip -r ../phonon-windows-arm64.zip . && cd ..

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            phonon-windows-x64.zip
            phonon-windows-arm64.zip
          generate_release_notes: true
